<div class="form-container">
  <h3>Параметры точки</h3>
  <form [formGroup]="pointForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="x">Координата X:</label>
      <select id="x" formControlName="x">
        <option *ngFor="let opt of xOptions" [value]="opt">{{ opt }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="y">Координата Y (-3 ... 5):</label>
      <input type="text" id="y" formControlName="y" placeholder="Введите значение от -3 до 5" />
      <div *ngIf="pointForm.get('y')?.invalid && pointForm.get('y')?.touched" class="error">
        <div *ngIf="pointForm.get('y')?.hasError('required')">Значение Y обязательно</div>
        <div *ngIf="pointForm.get('y')?.hasError('min') || pointForm.get('y')?.hasError('max')">
          Значение Y должно быть от -3 до 5
        </div>
        <div *ngIf="pointForm.get('y')?.hasError('pattern')">Значение Y должно быть числом</div>
      </div>
    </div>

    <div class="form-group">
      <label for="r">Радиус R:</label>
      <select id="r" formControlName="r">
        <option *ngFor="let opt of rOptions" [value]="opt">{{ opt }}</option>
      </select>
    </div>

    <button type="submit" [disabled]="pointForm.invalid">Проверить</button>
  </form>
</div>
