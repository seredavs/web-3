<div class="login-container">
  <h2>Вход в систему</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="login">Логин</label>
      <input type="text" id="login" formControlName="login" placeholder="Введите логин" />
      <div *ngIf="loginForm.get('login')?.invalid && loginForm.get('login')?.touched" class="error">
        <div *ngIf="loginForm.get('login')?.hasError('required')">Логин обязателен</div>
        <div *ngIf="loginForm.get('login')?.hasError('pattern')">Неверный логин</div>
      </div>
    </div>
    <div class="form-group">
      <label for="password">Пароль</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        placeholder="Введите пароль"
      />
      <div
        *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        class="error"
      >
        Пароль обязателен
      </div>
    </div>
    <div class="button-group">
      <button type="submit" [disabled]="loginForm.invalid">Войти</button>
      <button type="button" routerLink="/auth/reg" class="secondary-btn">Нет аккаунта?</button>
    </div>
  </form>
</div>
